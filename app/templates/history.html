<!DOCTYPE html>
<html>
<head>
    <title>Disaster History</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        /* CARD */
        .card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* MAP */
        #map {
            height: 400px;
            border-radius: 12px;
        }

        /* REPORT ITEM */
        .report {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .report:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.1);
        }

        /* BADGES */
        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .high { background: #ff4d4d; }
        .medium { background: #ffa500; }
        .low { background: #4caf50; }

        h2, h3 {
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🗂 Disaster History</h2>
    <div>
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
    </div>
</div>

<div class="container">

<!-- 🌍 MAP -->
<div class="card">
    <h3>🌍 Disaster Map</h3>
    <div id="map"></div>
</div>

<!-- 📜 REPORT LIST -->
<div class="card">
    <h3>📜 Past Reports</h3>

    {% for r in reports %}
    <div class="report">

        <b>{{ r.disaster_type }}</b>

        <span class="badge 
            {% if r.severity == 'High' %}high
            {% elif r.severity == 'Medium' %}medium
            {% else %}low
            {% endif %}
        ">
            {{ r.severity }}
        </span>

        <p style="margin-top:8px; opacity:0.8;">
            {{ r.description }}
        </p>

    </div>
    {% endfor %}

</div>

</div>

<script>
// 🌍 MAP INIT
var map = L.map('map').setView([20, 78], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// 📍 DATA FROM DJANGO
const locations = {{ locations|safe }};

// 🎯 MARKERS
locations.forEach(loc => {
    if (loc.lat && loc.lon) {

        let color = loc.severity === "High" ? "red" :
                    loc.severity === "Medium" ? "orange" : "green";

        L.circleMarker([loc.lat, loc.lon], {
            color: color,
            radius: 8,
            fillOpacity: 0.8
        })
        .addTo(map)
        .bindPopup(
            `<b>${loc.type}</b><br>Severity: ${loc.severity}`
        );
    }
});
</script>

</body>
</html>
