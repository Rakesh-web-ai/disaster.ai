<!DOCTYPE html>
<html>
<head>
    <title>AI Disaster Response</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        .navbar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .card {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        textarea {
            width: 100%;
            height: 110px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.5);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            background: white;
            color: black;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            display: inline-block;
            margin-top: 5px;
        }

        .high { background: red; box-shadow: 0 0 10px red; }
        .medium { background: orange; box-shadow: 0 0 10px orange; }
        .low { background: green; box-shadow: 0 0 10px green; }

        #map {
            height: 320px;
            border-radius: 10px;
        }

        #preview {
            max-width: 200px;
            margin-top: 10px;
            border-radius: 10px;
            display: none;
        }

        h3 {
            margin-bottom: 10px;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🚨 AI Disaster Response</h2>
    <div>
        <a href="/">Home</a>
        <a href="/dashboard/">📊 Dashboard</a>
        <a href="/history/">🗂 History</a>
    </div>
</div>

<div class="container">

<!-- INPUT -->
<div class="card">
    <h3>📝 Describe Situation</h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="text" name="text" placeholder="Describe disaster..."></textarea>

        <br><br>

        <!-- IMAGE -->
        <input type="file" name="image" accept="image/*">
        <img id="preview">

        <br>

        <!-- LOCATION -->
        <input type="hidden" name="latitude" id="lat">
        <input type="hidden" name="longitude" id="lon">

        <button type="button" onclick="startVoice()">🎤 Speak</button>
        <button type="submit">🚀 Analyze</button>
    </form>
</div>

<!-- MAP -->
<div class="card">
    <h3>🌍 Your Location</h3>
    <div id="map"></div>
</div>

<!-- RESULT -->
{% if result %}
<div class="result">
    {{ result|safe }}
</div>
{% endif %}

</div>

<script>
// LOCATION
navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    document.getElementById("lat").value = lat;
    document.getElementById("lon").value = lon;

    var map = L.map('map').setView([lat, lon], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

    L.marker([lat, lon])
    .addTo(map)
    .bindPopup("📍 You are here")
    .openPopup();

}, () => {
    document.getElementById("map").innerHTML = "Location access denied.";
});

// VOICE
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-IN';

    recognition.onresult = function(event) {
        document.getElementById("text").value = event.results[0][0].transcript;
    };

    recognition.start();
}

// IMAGE PREVIEW
document.querySelector("input[type=file]").onchange = function(e){
    const file = e.target.files[0];
    if(file){
        const preview = document.getElementById("preview");
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
};
</script>

</body>
</html>
